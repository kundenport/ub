<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Unsubscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

    .card {
      width: 380px;
      padding: 40px 35px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    h2 {
      margin: 0;
      font-weight: 600;
      font-size: 22px;
      color: #333;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }

    form {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input[type="text"] {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #667eea;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #5a67d8;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Unsubscribe</h2>
    <div class="subtitle">

    </div>

    <form method="post" action="https://vtechevents.eu/de_supportportal/unsubscribe/unsubscribe.php">
      <input type="text" name="e" id="emailInput" placeholder="Your email address" required>
      <button type="submit">Confirm Unsubscription</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("e");

    if (email) {
      const input = document.getElementById("emailInput");
      input.value = email;
    }
  </script>
</body>
</html>
